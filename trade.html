<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>实在传奇 - 物品交易公示站</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/trade-style.css">
    <!-- 引入外部 JS 文件 -->
    <script type="text/javascript" src="https://wow.techbrood.com/libs/jquery/jquery-2.1.1.min.js"></script>
    <script src="https://unpkg.com/vconsole@3.3.4/dist/vconsole.min.js"></script>
    <!-- 先加载 API 接口封装文件 -->
    <script src="js/trade-api.js" type="text/javascript"></script>
    <!-- 再加载业务逻辑文件 -->
    <script src="js/trade.js" type="text/javascript"></script>
    <script>
        // 初始化 vConsole（调试用）
        //var vConsole = new VConsole();
        console.log('实在传奇物品交易公示站已加载');
    </script>
</head>
<body style="background-color:#f5f5f5;">
    <!-- 顶部导航栏 -->
    <div class="trade-header">
        <div class="header-content">
            <h1 class="site-title">实在传奇 - 物品交易公示站</h1>
            <a href="shizai.html" class="back-link">← 返回资料站</a>
        </div>
    </div>

    <div class="container" style="margin-top: 20px;">
        <!-- 未登录状态 -->
        <div id="trade-login-prompt">
            <div class="login-prompt-content">
                <h2>欢迎来到物品交易公示站</h2>
                <p>登录后即可发布物品信息、查看联系方式</p>
                <button class="btn-primary btn-large" onclick="showLoginModal()">登录/注册</button>
            </div>
        </div>
        
        <!-- 已登录状态 -->
        <div id="trade-user-panel" style="display:none;">
            <div class="trade-tabs">
                <button class="tab-btn active" data-tab="list">📦 物品列表</button>
                <button class="tab-btn" data-tab="publish">✏️ 发布物品</button>
                <button class="tab-btn" data-tab="my">📋 我的发布</button>
                <button class="tab-btn" data-tab="user">👤 个人中心</button>
            </div>
            
            <!-- Tab 1: 物品列表 -->
            <div id="trade-tab-list" class="tab-content active">
                <!-- 搜索筛选栏 -->
                <div class="trade-filter">
                    <input type="text" id="search-keyword" placeholder="🔍 搜索物品名称/属性">
                    <select id="filter-type">
                        <option value="">全部类型</option>
                        <option value="wq">⚔️ 武器</option>
                        <option value="yf">👕 衣服</option>
                        <option value="tk">🪖 头盔</option>
                        <option value="xl">📿 项链</option>
                        <option value="sz">💫 手镯</option>
                        <option value="jz">💍 戒指</option>
                        <option value="sj">📖 书籍</option>
                        <option value="cl">⛏️ 材料</option>
                        <option value="xz">🎖️ 勋章</option>
                    </select>
                    <select id="filter-currency">
                        <option value="">全部货币</option>
                        <option value="gold">💰 金币</option>
                        <option value="rmb">💵 RMB</option>
                    </select>
                    <button class="btn-search">搜索</button>
                </div>
                
                <!-- 物品列表 -->
                <div id="trade-goods-list" class="trade-list">
                    <!-- 动态加载物品卡片 -->
                </div>
                
                <!-- 分页控件 -->
                <div id="trade-pagination" class="pagination"></div>
            </div>
            
            <!-- Tab 2: 发布物品 -->
            <div id="trade-tab-publish" class="tab-content">
                <div class="form-container">
                    <h3 style="margin-top:0;">📝 发布物品信息</h3>
                    <form id="publish-form" class="trade-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>物品名称 *</label>
                                <input type="text" name="goods_name" required placeholder="例如：屠龙刀、魔法长袍">
                            </div>
                            
                            <div class="form-group">
                                <label>物品类型 *</label>
                                <select name="goods_type" required>
                                    <option value="">请选择类型</option>
                                    <option value="wq">⚔️ 武器</option>
                                    <option value="yf">👕 衣服</option>
                                    <option value="tk">🪖 头盔</option>
                                    <option value="xl">📿 项链</option>
                                    <option value="sz">💫 手镯</option>
                                    <option value="jz">💍 戒指</option>
                                    <option value="sj">📖 书籍</option>
                                    <option value="cl">⛏️ 材料</option>
                                    <option value="xz">🎖️ 勋章</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>物品属性</label>
                            <input type="text" name="goods_attr" placeholder="例如：攻击 2-5 / 防御 3-6">
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label>货币类型 *</label>
                                <select name="currency_type" required>
                                    <option value="gold">💰 金币</option>
                                    <option value="rmb">💵 RMB</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>价格 *</label>
                                <input type="text" name="price" required placeholder="请输入价格" pattern="\\d+" inputmode="numeric">
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label>联系方式类型 *</label>
                                <select name="contact_type" required>
                                    <option value="qq">QQ</option>
                                    <option value="wechat">微信</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>联系方式 *</label>
                                <input type="text" name="contact_info" required placeholder="请输入 QQ 或微信号">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>物品图片</label>
                            <input type="hidden" name="goods_img" id="goods-img-url">
                            <div style="margin-top:5px;display:flex;gap:10px;align-items:center;">
                                <button type="button" class="btn-secondary" onclick="uploadImage()">📷 上传图片</button>
                                <span id="img-url-status" style="font-size:12px;color:#666;"></span>
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">✅ 提交发布</button>
                            <button type="reset" class="btn-secondary">🔄 重置清空</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Tab 3: 我的发布 -->
            <div id="trade-tab-my" class="tab-content">
                <div id="my-goods-list" class="trade-list">
                    <!-- 动态加载我的物品列表 -->
                </div>
            </div>
            
            <!-- Tab 4: 个人中心 -->
            <div id="trade-tab-user" class="tab-content">
                <div class="user-info">
                    <h3 style="margin-top:0;">👤 个人信息</h3>
                    <p><strong>用户名：</strong><span id="user-name" style="color:#007bff;font-size:18px;"></span></p>
                    <button onclick="logout()" class="btn-danger">🚪 退出登录</button>
                </div>
            </div>
        </div>
        
        <!-- 风险声明 -->
        <div class="trade-risk-notice">
            <p><strong>⚠️ 风险提示：</strong>本服务站仅提供信息公示，不参与任何交易过程。交易存在风险，请自行判断对方信用，谨防上当受骗。如发现虚假信息或违规行为，请联系管理员处理。</p>
        </div>
    </div>

    <!-- 底部信息 -->
    <div class="trade-footer">
        <p>© 2026 实在传奇物品交易公示站 | <a href="shizai.html" style="color:white;">返回资料站首页</a></p>
        <p style="font-size:12px;color:#aaa;margin-top:10px;">本服务站仅提供信息公示，不担保交易安全</p>
    </div>

    <!-- 登录弹窗 -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 style="margin-top:0;">🔐 用户登录</h3>
            <form id="login-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn-primary" style="width:100%;">登录</button>
                <button type="button" onclick="showRegisterForm()" class="btn-secondary" style="width:100%;margin-top:10px;">去注册</button>
            </form>
            
            <form id="register-form" style="display:none;">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="reg_username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="reg_password" required placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="reg_email" required placeholder="请输入邮箱地址">
                </div>
                <button type="submit" class="btn-primary" style="width:100%;">注册</button>
                <button type="button" onclick="showLoginForm()" class="btn-secondary" style="width:100%;margin-top:10px;">返回登录</button>
            </form>
        </div>
    </div>

    <!-- 物品详情弹窗 -->
    <div id="goods-modal" class="modal">
        <div class="modal-content modal-large">
            <span class="close">&times;</span>
            <div id="goods-detail-content">
                <!-- 动态加载物品详情 -->
            </div>
        </div>
    </div>
</body>
</html>
